[package]
name = "ile"
version = "0.1"
edition = 26

[dependencies]
fmt = "12.1.0"
cli = "2.6.2"
yyjson = "0.12.0"
protobuf = "3.21.12"
boost = "1.89.0"
cpx = {
    version = "0.1.0",
    features = ["fmt", "cli", "json", "protobuf"],
}
ggml = { version = "0.15.3", features = ["blas", "metal"], }
whisper = { version = "1.9.1", features = ["ggml/blas", "ggml/metal"] }
